<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WATCH TOWER | Accueil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --rich-black: #00072d; --dark-blue: #051650; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--rich-black); color: #ffffff; transition: all 0.4s ease; overflow: hidden; }
        .light-mode { background-color: #f8fafc; color: #0f172a; }
        .glass-card { background: rgba(5, 22, 80, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .light-mode .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0, 0, 0, 0.1); }
        .btn-gradient { background: linear-gradient(135deg, #123499, #0a2472); box-shadow: 0 10px 20px rgba(18, 52, 153, 0.3); }
        .input-style { background: rgba(0, 7, 45, 0.6); border: 1px solid rgba(59, 130, 246, 0.2); color: white; }
        .light-mode .input-style { background: #ffffff; border: 1px solid #cbd5e1; color: #0f172a; }

        #langModal {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 7, 45, 0.98);
            backdrop-filter: blur(25px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="langModal">
        <div class="glass-card p-10 rounded-[3rem] w-full max-w-md text-center border-white/10">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="languages" class="text-white w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 uppercase">Language / Langue</h2>
            <p class="text-slate-400 text-sm mb-8 italic">Please select your preferred language</p>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="setInitialLang('FR')" class="btn-gradient p-6 rounded-2xl font-bold flex flex-col items-center gap-3 transition-transform active:scale-95">
                    <span class="text-xl">FR</span>
                    <span class="text-[10px] opacity-70 uppercase tracking-widest">Français</span>
                </button>
                <button onclick="setInitialLang('EN')" class="bg-white/5 border border-white/10 hover:bg-white/10 p-6 rounded-2xl font-bold flex flex-col items-center gap-3 transition-transform active:scale-95">
                    <span class="text-xl">EN</span>
                    <span class="text-[10px] opacity-70 uppercase tracking-widest">English</span>
                </button>
            </div>
        </div>
    </div>

    <nav class="max-w-7xl mx-auto w-full p-6 flex justify-between items-center relative z-10">
        <div class="flex items-center gap-2">
            <i data-lucide="layers" class="text-blue-400 w-6 h-6"></i>
            <span class="font-extrabold tracking-tight uppercase">THE WATCH TOWER</span>
        </div>
        <div class="flex gap-3">
            <button id="langToggle" class="px-4 py-2 rounded-xl border border-blue-500/30 flex items-center gap-2 hover:bg-blue-500/10 transition-all">
                <i data-lucide="languages" class="w-4 h-4 text-blue-400"></i>
                <span id="langLabel" class="text-xs font-bold uppercase">FR</span>
            </button>
            <button id="themeToggle" class="p-2 rounded-xl border border-blue-500/30 hover:bg-blue-500/10 transition-all">
                <i id="themeIcon" data-lucide="sun" class="w-5 h-5 text-yellow-400"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 py-10 relative z-10">
        <div class="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">
            <div class="space-y-6 text-center lg:text-left order-1">
                <div class="inline-block px-4 py-2 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 font-bold text-[10px] uppercase tracking-widest">Excellence Digitale</div>
                <h1 id="mainTitle" class="text-4xl md:text-5xl xl:text-7xl font-extrabold leading-[1.1]">Maîtrisez votre <span class="text-blue-400">Écosystème</span> Digital</h1>
                <p id="subTitle" class="text-slate-400 text-lg md:text-xl max-w-xl mx-auto lg:mx-0 leading-relaxed"></p>
            </div>

            <div class="order-2">
                <div class="glass-card p-8 md:p-10 rounded-[2.5rem] w-full max-w-md mx-auto lg:ml-auto">
                    <h2 id="formTitle" class="text-2xl font-bold mb-8">Rejoindre le Hub</h2>
                    <form id="landingForm" class="space-y-5">
                        <input type="text" id="fullName" required class="input-style w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                        <input type="email" id="email" required class="input-style w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                        <button type="submit" id="submitBtn" class="btn-gradient w-full py-5 text-white font-extrabold rounded-2xl flex items-center justify-center gap-3 mt-2">
                            <span id="btnText">Obtenir mon cadeau</span>
                            <i data-lucide="zap" class="w-5 h-5"></i>
                        </button>
                    </form>
                    <div id="successMsg" class="hidden text-center p-6 bg-green-500/10 text-green-400 border border-green-500/20 rounded-2xl font-bold">Bienvenue ! Redirection...</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="max-w-7xl mx-auto w-full px-6 py-10 border-t border-blue-500/10 text-center md:text-left text-xs text-slate-500 uppercase">
         © THE WATCH TOWER 2026 | Arnold MENEMENE
    </footer>

    <script>
        const SB_URL = 'https://lateattegnkqduqbpvta.supabase.co';
        const SB_KEY = 'sb_publishable_SspxOBPHM5ZIdRnX8W4V0A_ONolbILg';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const translations = {
            FR: { 
                title: "Maîtrisez votre <span class='text-blue-400'>Écosystème</span> Digital", 
                sub: "Rejoignez le Hub et recevez immédiatement votre Cadeau : le Top 100 des automatisations business.", 
                form: "Rejoindre le Hub", btn: "Obtenir mon cadeau", 
                placeholderName: "Prénom & Nom", placeholderEmail: "Votre email pro",
                pdf: "Top-100-Automatisations-FR.pdf"
            },
            EN: { 
                title: "Master Your Digital <span class='text-blue-400'>Ecosystem</span>", 
                sub: "Join the Hub and immediately receive your Gift: the Top 100 business automations.", 
                form: "Join the Hub", btn: "Get my gift", 
                placeholderName: "Full Name", placeholderEmail: "Your pro email",
                pdf: "Top-100-Automatisations-EN.pdf"
            }
        };

        let currentLang = 'FR';

        function setInitialLang(lang) {
            currentLang = lang;
            localStorage.setItem('userLang', lang);
            document.getElementById('langModal').style.display = 'none';
            document.body.style.overflow = 'auto'; 
            updateUI();
        }

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('langLabel').innerText = currentLang;
            document.getElementById('mainTitle').innerHTML = t.title;
            document.getElementById('subTitle').innerHTML = t.sub;
            document.getElementById('formTitle').innerText = t.form;
            document.getElementById('btnText').innerText = t.btn;
            document.getElementById('fullName').placeholder = t.placeholderName;
            document.getElementById('email').placeholder = t.placeholderEmail;
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'FR' ? 'EN' : 'FR';
            localStorage.setItem('userLang', currentLang);
            updateUI();
        });

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isDark = !document.body.classList.contains('light-mode');
            document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        });

        document.getElementById('landingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const emailValue = document.getElementById('email').value.trim();
            const nameValue = document.getElementById('fullName').value.trim();
            
            btn.disabled = true;
            btn.innerText = "...";

            // Vérification Doublon
            const { data: existing } = await _supabase
                .from('contacts')
                .select('email')
                .eq('email', emailValue)
                .maybeSingle();

            if (existing) {
                window.location.href = `shop.html`;
                return;
            }

            // Inscription
            const { error } = await _supabase.from('contacts').insert([{ 
                full_name: nameValue, 
                email: emailValue, 
                language: currentLang,
                source: 'Landing Page Hub'
            }]);

            if (!error) {
                document.getElementById('landingForm').classList.add('hidden');
                document.getElementById('successMsg').classList.remove('hidden');

                // TELECHARGEMENT (Cherche le fichier à la racine du repo)
                const downloadLink = document.createElement('a');
                downloadLink.href = `./${translations[currentLang].pdf}`; 
                downloadLink.download = translations[currentLang].pdf;
                downloadLink.click();

                setTimeout(() => { window.location.href = `shop.html`; }, 1500);
            } else {
                alert("Erreur de connexion.");
                btn.disabled = false;
                btn.innerText = translations[currentLang].btn;
            }
        });

        lucide.createIcons();
    </script>
</body>
  </html>
