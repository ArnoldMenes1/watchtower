<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchtower | Mailer Engine Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --bg: #00072d; --text: #ffffff; --accent: #123499; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }
        body.light-mode { --bg: #f8fafc; --text: #0f172a; --card: #ffffff; --border: rgba(0,0,0,0.08); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; overflow-x: hidden; }
        
        .sidebar { width: 260px; position: fixed; height: 100vh; background: rgba(0,0,0,0.3); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        body.light-mode .sidebar { background: #ffffff; }
        
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 0.7rem 1.2rem; color: #64748b; font-weight: 700; font-size: 13px; border-radius: 12px; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }
        
        .glass-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; }
        .field { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px; padding: 10px; color: inherit; width: 100%; outline: none; font-size: 12px; }
        body.light-mode .field { background: #f1f5f9; color: #0f172a; border: 1px solid rgba(0,0,0,0.05); }
        
        #previewArea { background: white; border-radius: 12px; padding: 25px; color: #1d1d1f; border: 1px solid #e2e8f0; }
        .table-row:hover { background: rgba(18, 52, 153, 0.05); }
    </style>
</head>
<body class="flex">

    <aside class="sidebar p-5">
        <div class="flex items-center gap-2 mb-8 px-2 font-black italic text-[#123499] uppercase text-sm">
            <i data-lucide="shield"></i> Watchtower
        </div>
        
        <nav class="flex-grow space-y-1 overflow-y-auto">
            <a href="dashboard.html" class="nav-link"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</a>
            <a href="inventory.html" class="nav-link"><i data-lucide="package" class="w-4 h-4"></i> Boutique</a>
            <a href="crm.html" class="nav-link"><i data-lucide="users" class="w-4 h-4"></i> CRM Contacts</a>
            <a href="mailer-hub.html" class="nav-link active"><i data-lucide="mail" class="w-4 h-4"></i> Mailer Hub</a>
            <div class="py-3 text-[9px] font-black text-slate-500 uppercase tracking-widest px-4">Strategie</div>
            <a href="goals.html" class="nav-link"><i data-lucide="target" class="w-4 h-4"></i> Objectifs</a>
            <a href="tasks.html" class="nav-link"><i data-lucide="check-square" class="w-4 h-4"></i> Taches</a>
            <a href="social-manager.html" class="nav-link"><i data-lucide="share-2" class="w-4 h-4"></i> Social Manager</a>
            <a href="ai-hub.html" class="nav-link text-[#123499] bg-[#123499]/5"><i data-lucide="sparkles" class="w-4 h-4"></i> IA Hub</a>
        </nav>

        <div class="mt-auto pt-4 space-y-2 border-t border-white/5">
            <button onclick="toggleTheme()" class="w-full p-2.5 rounded-xl bg-[#123499]/10 border border-[#123499]/20 font-bold text-[10px] uppercase flex items-center justify-center gap-2 text-[#123499]">
                <i data-lucide="sun" class="w-3 h-3"></i> SWITCH THEME
            </button>
            <button onclick="window.location.href='login.html'" class="nav-link text-red-500 w-full justify-center bg-red-500/5">
                <i data-lucide="log-out" class="w-4 h-4"></i> Deconnexion
            </button>
        </div>
    </aside>

    <main class="flex-grow ml-[260px] p-8">
        <div class="glass-card mb-8 flex flex-wrap gap-4 items-end">
            <div class="flex-grow min-w-[200px]">
                <label class="text-[9px] font-black uppercase text-slate-500 mb-2 block">Ciblage par Langue</label>
                <select id="langFilter" class="field" onchange="filterContacts()">
                    <option value="all">Tous les contacts</option>
                    <option value="FR">Francais (FR)</option>
                    <option value="EN">Anglais (EN)</option>
                </select>
            </div>
            <div class="flex-grow min-w-[200px]">
                <label class="text-[9px] font-black uppercase text-slate-500 mb-2 block">Anciennete</label>
                <select id="timeFilter" class="field" onchange="filterContacts()">
                    <option value="all">Toute la base</option>
                    <option value="7">Nouveaux (Moins de 7 jours)</option>
                    <option value="30">Leads du mois (30 jours)</option>
                </select>
            </div>
            <button onclick="copyBulk()" class="bg-[#123499] text-white px-6 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:opacity-90">
                Copier les emails filtres
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="glass-card">
                    <h2 class="text-[10px] font-black uppercase text-[#123499] mb-4 tracking-widest">Configuration</h2>
                    <input type="text" id="mailSubject" class="field font-bold mb-4 py-3" placeholder="Sujet de l'email">
                    <textarea id="mailBody" rows="12" class="field" oninput="updatePreview()" placeholder="Bonjour {{nom}}, [btn_1]"></textarea>
                </div>

                <div class="glass-card">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-[10px] font-black uppercase text-slate-500">Boutons d'appel a l'action</h2>
                        <button onclick="addBtn()" class="bg-[#123499] p-1.5 rounded-lg text-white"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>
                    <div id="btnContainer" class="space-y-2"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div id="previewArea"></div>
                <div class="flex gap-3">
                    <button onclick="copySource()" class="flex-grow py-4 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-[#123499]/10">Copier HTML</button>
                    <button onclick="sendDirectly()" class="flex-grow py-4 bg-[#123499] text-white rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-blue-900/20">Expedier</button>
                </div>
            </div>
        </div>

        <div class="glass-card mt-10 overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-[11px] font-black uppercase text-[#123499] flex items-center gap-2">
                    <i data-lucide="database" class="w-4 h-4"></i> Liste Filtree (<span id="count">0</span>)
                </h2>
                <button onclick="loadContacts()" class="text-xs text-slate-400 hover:text-white"><i data-lucide="refresh-cw" class="w-3 h-3"></i></button>
            </div>
            
            <div class="overflow-x-auto custom-scroll">
                <table class="w-full text-left text-[11px]">
                    <thead>
                        <tr class="border-b border-white/10 text-slate-500">
                            <th class="pb-4 px-2">NOM DU CONTACT</th>
                            <th class="pb-4 px-2">EMAIL</th>
                            <th class="pb-4 px-2">LANGUE</th>
                            <th class="pb-4 px-2">DATE</th>
                            <th class="pb-4 px-2 text-right">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="dbRows"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Correction de l'erreur JWT Expired par persistSession: false
        const _supabase = supabase.createClient('https://lateattegnkqduqbpvta.supabase.co', 'sb_publishable_SspxOBPHM5ZIdRnX8W4V0A_ONolbILg', {
            auth: { persistSession: false }
        });

        let rawContacts = [];
        let filteredContacts = [];
        let buttons = [{ id: 1, text: "Acceder au Hub", url: "https://theprodlabs.com" }];
        let selectedEmail = "";

        function toggleTheme() { document.body.classList.toggle('light-mode'); lucide.createIcons(); }

        async function loadContacts() {
            const tbody = document.getElementById('dbRows');
            tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center text-slate-500 font-bold animate-pulse italic uppercase">Synchronisation Supabase...</td></tr>';
            try {
                const { data, error } = await _supabase.from('contacts').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                rawContacts = data;
                filterContacts();
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-red-500 font-bold italic">Erreur : ${err.message}</td></tr>`;
            }
        }

        function filterContacts() {
            const lang = document.getElementById('langFilter').value;
            const days = document.getElementById('timeFilter').value;
            const now = new Date();

            filteredContacts = rawContacts.filter(c => {
                const matchLang = lang === 'all' || c.language === lang;
                let matchTime = true;
                if (days !== 'all') {
                    const diff = (now - new Date(c.created_at)) / (1000 * 60 * 60 * 24);
                    matchTime = diff <= parseInt(days);
                }
                return matchLang && matchTime;
            });

            renderTable();
        }

        function renderTable() {
            document.getElementById('count').innerText = filteredContacts.length;
            const tbody = document.getElementById('dbRows');
            tbody.innerHTML = filteredContacts.map(c => `
                <tr class="table-row border-b border-white/5 transition-colors">
                    <td class="py-4 px-2 font-bold uppercase">${c.full_name || 'Abonne'}</td>
                    <td class="py-4 px-2 text-slate-400 font-mono text-[10px]">${c.email}</td>
                    <td class="py-4 px-2"><span class="px-2 py-1 bg-blue-500/10 text-[#123499] rounded-md text-[9px] font-black">${c.language || 'FR'}</span></td>
                    <td class="py-4 px-2 text-slate-500 italic">${new Date(c.created_at).toLocaleDateString()}</td>
                    <td class="py-4 px-2 text-right">
                        <button onclick="selectSingle('${c.full_name}', '${c.email}')" class="text-[#123499] font-black bg-[#123499]/10 px-3 py-1.5 rounded-lg text-[9px] uppercase hover:bg-[#123499] hover:text-white">Selectionner</button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function selectSingle(nom, email) {
            selectedEmail = email;
            updatePreview(nom);
            alert(`Cible verrouillee : ${nom}`);
        }

        function copyBulk() {
            const emails = filteredContacts.map(c => c.email).join(', ');
            navigator.clipboard.writeText(emails);
            alert(`${filteredContacts.length} emails copies ! Colle-les dans le champ BCC de ton mail.`);
        }

        function updatePreview(overrideNom = "Cher Membre") {
            let bodyText = document.getElementById('mailBody').value || "Bonjour {{nom}},\n\n[btn_1]";
            let html = bodyText.trim().replace(/\n\n+/g, '</p><p style="margin: 0 0 15px 0;">').replace(/\n/g, '<br>');
            html = html.replace(/{{nom}}/g, `<strong style="color:#123499;">${overrideNom}</strong>`);
            
            buttons.forEach(btn => {
                html = html.replace(`[btn_${btn.id}]`, `
                    <div style="margin: 20px 0;"><a href="${btn.url}" style="background:#123499; color:#ffffff; padding:12px 24px; border-radius:6px; text-decoration:none; font-weight:800; font-size:13px; display:inline-block;">${btn.text}</a></div>
                `);
            });

            document.getElementById('previewArea').innerHTML = `
                <div style="max-width: 500px; margin: auto; font-family: sans-serif; border: 1px solid #f0f0f0; padding: 20px; border-radius: 10px;">
                    <div style="border-bottom: 3px solid #123499; padding-bottom: 15px; margin-bottom: 20px;">
                        <span style="font-weight: 900; font-size: 10px; text-transform: uppercase; color: #123499; letter-spacing: 2px;">The Productivity Labs Hub</span>
                    </div>
                    <div style="font-size: 14px; line-height: 1.6; color: #333;">${html}</div>
                </div>`;
        }

        function addBtn() {
            const nextId = buttons.length > 0 ? Math.max(...buttons.map(b => b.id)) + 1 : 1;
            buttons.push({ id: nextId, text: "Voir le produit", url: "" });
            renderBtns();
        }

        function renderBtns() {
            document.getElementById('btnContainer').innerHTML = buttons.map(btn => `
                <div class="p-3 bg-black/10 rounded-xl border border-white/5 flex flex-col gap-2">
                    <div class="flex justify-between text-[8px] font-black text-[#123499] uppercase">
                        <span>Tag : [btn_${btn.id}]</span>
                        <button onclick="buttons=buttons.filter(b=>b.id!=${btn.id});renderBtns();updatePreview();" class="text-red-500">Supprimer</button>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" value="${btn.text}" class="field w-1/2" oninput="buttons.find(b=>b.id==${btn.id}).text=this.value;updatePreview()">
                        <input type="url" value="${btn.url}" class="field w-1/2" placeholder="URL" oninput="buttons.find(b=>b.id==${btn.id}).url=this.value;updatePreview()">
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function sendDirectly() {
            const subject = encodeURIComponent(document.getElementById('mailSubject').value);
            const emails = selectedEmail || filteredContacts.map(c => c.email).join(',');
            if(!emails) return alert("Aucun destinataire selectionne !");
            const mailtoLink = selectedEmail 
                ? `mailto:${selectedEmail}?subject=${subject}`
                : `mailto:arnold@theprodlabs.com?bcc=${emails}&subject=${subject}`;
            window.location.href = mailtoLink;
        }

        function copySource() {
            navigator.clipboard.writeText(document.getElementById('previewArea').innerHTML);
            alert("HTML Copie !");
        }

        loadContacts();
        renderBtns();
        updatePreview();
        lucide.createIcons();
    </script>
</body>
</html>
