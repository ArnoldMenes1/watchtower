<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | The Watchtower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --rich-black: #00072d; --accent: #123499; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--rich-black); 
            color: #ffffff;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .input-field {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            color: white;
        }
        .input-field:focus {
            border-color: var(--accent);
            background: rgba(18, 52, 153, 0.05);
            outline: none;
            box-shadow: 0 0 15px rgba(18, 52, 153, 0.2);
        }
        .glow {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: var(--accent);
            filter: blur(150px);
            border-radius: 50%;
            opacity: 0.1;
            z-index: -1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="w-full p-6 flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <i data-lucide="shield-check" class="text-blue-500 w-6 h-6"></i>
            <span class="font-extrabold tracking-tighter text-xl uppercase italic">The Watchtower</span>
        </div>
        <div class="hidden md:flex items-center gap-2 text-[10px] font-bold text-slate-500 tracking-[0.2em] uppercase">
            <i data-lucide="lock" class="w-3 h-3"></i>
            Point d'accès sécurisé
        </div>
    </nav>

    <div class="glow -top-20 -left-20"></div>
    <div class="glow -bottom-20 -right-20"></div>

    <main class="flex-grow flex items-center justify-center px-6 relative">
        <div class="glass-card w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl relative z-10">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-blue-600/20 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-blue-500/30">
                    <i data-lucide="user-cog" class="text-blue-500 w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-extrabold mb-2 tracking-tight">Bonjour, Arnold</h1>
                <p class="text-slate-500 text-sm">Entrez vos accès pour piloter le Hub.</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase ml-2 tracking-widest">Email Administrateur</label>
                    <div class="relative text-white">
                        <i data-lucide="mail" class="absolute left-4 top-4 w-5 h-5 text-slate-500"></i>
                        <input type="email" id="email" required placeholder="ton-email@exemple.com" 
                            class="input-field w-full p-4 pl-12 rounded-2xl text-sm">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase ml-2 tracking-widest">Clé d'accès</label>
                    <div class="relative">
                        <i data-lucide="key-round" class="absolute left-4 top-4 w-5 h-5 text-slate-500"></i>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="input-field w-full p-4 pl-12 rounded-2xl text-sm">
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-extrabold rounded-2xl transition-all shadow-lg shadow-blue-900/40 flex items-center justify-center gap-3 active:scale-95">
                    <span id="btnText">Initialiser la session</span>
                    <i data-lucide="cpu" class="w-5 h-5"></i>
                </button>
            </form>

            <div id="errorMsg" class="hidden mt-6 p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-[11px] text-center rounded-xl font-bold">
                </div>
        </div>
    </main>

    <footer class="p-8 text-center text-[10px] text-slate-600 font-bold uppercase tracking-widest z-10">
        &copy; 2026 The Productivity Labs Hub &bull; Lubumbashi HQ
    </footer>

    <script>
        // CONFIGURATION SUPABASE
        const SB_URL = 'https://lateattegnkqduqbpvta.supabase.co';
        const SB_KEY = 'sb_publishable_SspxOBPHM5ZIdRnX8W4V0A_ONolbILg';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // 1. Initialisation des icônes
        lucide.createIcons();

        // 2. Vérification si déjà connecté (Auto-Login)
        async function checkExistingSession() {
            const { data } = await _supabase.auth.getSession();
            if (data.session) {
                window.location.href = 'dashboard.html';
            }
        }
        checkExistingSession();

        // 3. Gestion de la connexion
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const errorMsg = document.getElementById('errorMsg');

            // UI State
            btn.disabled = true;
            btnText.innerText = "Authentification...";
            errorMsg.classList.add('hidden');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    // Traduction simple des erreurs courantes
                    let message = error.message;
                    if(message.includes("Invalid login")) message = "Email ou mot de passe incorrect.";
                    
                    errorMsg.innerText = message;
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btnText.innerText = "Réessayer";
                } else if (data.user) {
                    btnText.innerText = "Accès autorisé !";
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                }
            } catch (err) {
                alert("Erreur système : " + err.message);
                btn.disabled = false;
                btnText.innerText = "Initialiser la session";
            }
        });
    </script>
</body>
</html>
