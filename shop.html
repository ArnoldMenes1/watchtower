<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | The Productivity Labs Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { 
            --rich-black: #00072d; 
            --accent: #123499; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--rich-black); 
            color: #ffffff; 
            transition: background 0.3s ease;
        }
        .light-mode { background-color: #f8fafc; color: #0f172a; --glass: rgba(0, 0, 0, 0.03); --glass-border: rgba(0, 0, 0, 0.1); }
        
        .product-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .product-card:hover { transform: translateY(-8px); border-color: var(--accent); }

        #productModal { backdrop-filter: blur(10px); display: none; opacity: 0; transition: opacity 0.3s ease; }
        #productModal.active { display: flex; opacity: 1; }

        .btn-primary { background: linear-gradient(135deg, #123499, #051650); transition: all 0.3s ease; }
        .btn-primary:hover { transform: scale(1.02); filter: brightness(1.2); }

        @media (max-width: 640px) {
            .modal-content { flex-direction: column-reverse; max-height: 90vh; overflow-y: auto; }
            .modal-image { height: 250px; }
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="sticky top-0 z-50 backdrop-blur-xl border-b border-white/5 px-4 lg:px-10 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
            <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center">
                <i data-lucide="layers" class="text-white w-6 h-6"></i>
            </div>
            <span class="font-extrabold tracking-tighter text-xl hidden sm:block">THE WATCH TOWER</span>
        </div>

        <div class="flex items-center gap-3">
            <button id="langToggle" class="flex items-center gap-2 px-4 py-2 bg-white/5 rounded-full border border-white/10">
                <i data-lucide="languages" class="w-4 h-4"></i>
                <span id="currentLangLabel" class="text-xs font-bold uppercase">FR</span>
            </button>
            <button id="themeToggle" class="p-2 bg-white/5 rounded-full border border-white/10">
                <i id="themeIcon" data-lucide="sun" class="w-5 h-5 text-yellow-400"></i>
            </button>
        </div>
    </nav>

    <section class="max-w-7xl mx-auto px-6 mt-12 mb-8 flex flex-wrap gap-4 items-center justify-between">
        <div>
            <h1 id="storeTitle" class="text-4xl lg:text-6xl font-extrabold mb-2">Boutique <span class="text-blue-500 tracking-tighter">Hub</span></h1>
            <p id="storeSub" class="text-slate-400 text-sm max-w-2xl"></p>
        </div>
        <div class="flex gap-2">
            <select id="categoryFilter" class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm text-inherit">
                <option value="all">Toutes catégories</option>
                <option value="Notion">Notion</option>
                <option value="Software">Software</option>
            </select>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6">
        <div id="productContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="col-span-full text-center py-20 opacity-50 italic">Initialisation du flux de données...</p>
        </div>
    </main>

    <div id="productModal" class="fixed inset-0 z-[100] p-4 items-center justify-center">
        <div class="absolute inset-0 bg-black/80" onclick="closeModal()"></div>
        <div class="modal-content relative bg-[#000d45] border border-white/10 w-full max-w-4xl rounded-[32px] overflow-hidden flex flex-col md:flex-row">
            <div class="flex-1 p-8 md:p-12 flex flex-col justify-between bg-[#000d45]">
                <div>
                    <div id="modalCategory" class="text-blue-400 text-xs font-bold uppercase tracking-widest mb-4">Catégorie</div>
                    <h2 id="modalTitle" class="text-3xl md:text-4xl font-black mb-6">Nom</h2>
                    <p id="modalDesc" class="text-slate-400 leading-relaxed mb-8">Description...</p>
                </div>
                <div class="flex items-center justify-between gap-6 border-t border-white/10 pt-8">
                    <div id="modalPrice" class="text-3xl font-black text-white">0$</div>
                    <button id="modalBuyBtn" class="btn-primary flex-1 py-4 rounded-2xl font-black flex items-center justify-center gap-3">
                        <span id="buyBtnLabel">ACHETER</span>
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div class="md:w-1/2 h-64 md:h-auto bg-slate-900">
                <img id="modalImg" src="" class="w-full h-full object-cover">
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://lateattegnkqduqbpvta.supabase.co';
        const SB_KEY = 'sb_publishable_SspxOBPHM5ZIdRnX8W4V0A_ONolbILg';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentLang = localStorage.getItem('userLang') || (navigator.language.startsWith('fr') ? 'FR' : 'EN');
        let allProducts = [];

        const i18n = {
            FR: { title: "Store", sub: "Nous concevons des architectures numériques pour transformer votre chaos opérationnel en une structure fluide.", cat: "Toutes catégories", buy: "ACHETER MAINTENANT" },
            EN: { title: "The Shop", sub: "We engineer digital architectures to transform your operational chaos into fluid structure.", cat: "All Categories", buy: "BUY NOW" }
        };

        async function init() {
            updateUIStrings();
            await fetchProducts();
            setupEventListeners();
        }

        function updateUIStrings() {
            const lang = i18n[currentLang];
            document.getElementById('storeTitle').innerHTML = `${lang.title} <span class="text-blue-500 tracking-tighter">${currentLang}</span>`;
            document.getElementById('storeSub').innerText = lang.sub;
            document.getElementById('currentLangLabel').innerText = currentLang;
            document.getElementById('buyBtnLabel').innerText = lang.buy;
        }

        async function fetchProducts() {
            const container = document.getElementById('productContainer');
            
            try {
                // 1. TENTATIVE NORMALE (FILTRÉE)
                let { data, error } = await _supabase
                    .from('products')
                    .select('*')
                    .eq('language', currentLang.toUpperCase())
                    .eq('is_active', true);

                // 2. TENTATIVE DE SECOURS (Si rien n'est trouvé, on prend tout pour tester)
                if (error || !data || data.length === 0) {
                    console.log("Mode secours activé...");
                    const fallback = await _supabase.from('products').select('*').limit(10);
                    data = fallback.data;
                }

                allProducts = data || [];
                renderProducts(allProducts);
            } catch (err) {
                container.innerHTML = `<p class="col-span-full text-center">Erreur système : ${err.message}</p>`;
            }
        }

        function renderProducts(list) {
            const container = document.getElementById('productContainer');
            if (list.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center">La base de données est actuellement vide.</p>`;
                return;
            }
            container.innerHTML = list.map(p => `
                <div class="product-card p-6 cursor-pointer" onclick="openModal('${p.id}')">
                    <img src="${p.image_url}" class="w-full h-48 object-cover rounded-xl mb-4">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-extrabold text-lg">${p.name}</h3>
                        <span class="text-blue-500 font-bold">${p.price}${p.currency === 'EUR' ? '€' : '$'}</span>
                    </div>
                    <p class="text-slate-400 text-xs line-clamp-2 mb-4">${p.description || ''}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] uppercase font-bold opacity-50">${p.category}</span>
                        <i data-lucide="plus-circle" class="w-5 h-5 text-blue-500"></i>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openModal(id) {
            const p = allProducts.find(x => x.id === id);
            if(!p) return;
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalDesc').innerText = p.description || "";
            document.getElementById('modalPrice').innerText = `${p.price}${p.currency === 'EUR' ? '€' : '$'}`;
            document.getElementById('modalCategory').innerText = p.category;
            document.getElementById('modalImg').src = p.image_url;
            document.getElementById('modalBuyBtn').onclick = () => window.location.href = p.chariow_link;
            document.getElementById('productModal').classList.add('active');
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('productModal').classList.remove('active'); }

        function setupEventListeners() {
            document.getElementById('langToggle').onclick = () => {
                currentLang = currentLang === 'FR' ? 'EN' : 'FR';
                localStorage.setItem('userLang', currentLang);
                init();
            };
            document.getElementById('themeToggle').onclick = () => {
                document.body.classList.toggle('light-mode');
                lucide.createIcons();
            };
            document.getElementById('categoryFilter').onchange = (e) => {
                const filtered = e.target.value === 'all' ? allProducts : allProducts.filter(p => p.category === e.target.value);
                renderProducts(filtered);
            };
        }

        init();
    </script>
</body>
                            </html>
