<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks Manager | The Watchtower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --rich-black: #00072d; --accent: #123499; --card-bg: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.05); --text-main: #ffffff; --text-mute: #94a3b8; }
        body.light-mode { --rich-black: #f8fafc; --card-bg: #ffffff; --border: rgba(0, 0, 0, 0.06); --text-main: #0f172a; --text-mute: #64748b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--rich-black); color: var(--text-main); margin: 0; transition: background 0.3s; overflow-x: hidden; }
        
        .sidebar { background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(20px); border-right: 1px solid var(--border); }
        body.light-mode .sidebar { background: #ffffff; }
        
        .nav-link { transition: 0.3s; border-radius: 12px; color: var(--text-mute); display: flex; align-items: center; gap: 12px; padding: 0.8rem 1rem; font-size: 0.875rem; font-weight: 700; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }
        
        .task-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; transition: 0.3s; cursor: grab; }
        .task-card:active { cursor: grabbing; scale: 0.98; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .priority-high { color: #ef4444; border-color: #ef4444; }
        .priority-mid { color: #f59e0b; border-color: #f59e0b; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar w-72 fixed h-full flex flex-col p-6 z-50">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="p-2 bg-[#123499] rounded-lg"><i data-lucide="shield" class="w-6 h-6 text-white"></i></div>
            <span class="font-extrabold tracking-tighter text-xl uppercase italic">The Watchtower</span>
        </div>

        <nav class="flex-grow space-y-1 overflow-y-auto pr-2">
            <a href="dashboard.html" class="nav-link"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</a>
            <a href="inventory.html" class="nav-link"><i data-lucide="package" class="w-4 h-4"></i> Boutique</a>
            <a href="crm.html" class="nav-link"><i data-lucide="users" class="w-4 h-4"></i> CRM Contacts</a>
            <a href="mailer-hub.html" class="nav-link"><i data-lucide="mail" class="w-4 h-4"></i> Mailler Hub</a>
            
            <div class="pt-6 pb-2 px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Stratégie</div>
            <a href="goals.html" class="nav-link"><i data-lucide="target" class="w-4 h-4"></i> Objectifs</a>
            <a href="tasks.html" class="nav-link active"><i data-lucide="check-square" class="w-4 h-4"></i> Tâches</a>
            <a href="social-manager.html" class="nav-link"><i data-lucide="share-2" class="w-4 h-4"></i> Social Manager</a>
            
            <div class="pt-6 pb-2 px-4 text-[10px] font-black text-blue-500 uppercase tracking-[0.2em]">Intelligence</div>
            <a href="ai-hub.html" class="nav-link border border-blue-500/20 bg-blue-500/5 text-blue-400">
                <i data-lucide="sparkles" class="w-4 h-4"></i> IA Hub
            </a>
        </nav>

        <div class="mt-auto pt-6 space-y-2 border-t border-white/5">
            <button onclick="toggleTheme()" class="w-full p-3 rounded-xl bg-[#123499]/10 text-[#123499] font-black text-[10px] uppercase flex items-center justify-center gap-2 border border-[#123499]/20 hover:bg-[#123499]/20 transition-all">
                <i data-lucide="sun" class="w-4 h-4"></i> SWITCH THÈME
            </button>
            <button onclick="logout()" class="nav-link text-red-500 hover:bg-red-500/10 w-full justify-center">
                <i data-lucide="log-out" class="w-4 h-4"></i> Déconnexion
            </button>
        </div>
    </aside>

    <main class="flex-grow ml-72 p-10">
        <header class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-4xl font-black uppercase tracking-tight">Mission Control</h1>
                <p class="text-slate-500 text-sm font-bold mt-1 uppercase tracking-widest">Gestion des tâches opérationnelles</p>
            </div>
            <button onclick="openModal()" class="bg-[#123499] text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-blue-900/40 flex items-center gap-2 hover:scale-105 transition-all">
                <i data-lucide="plus" class="w-4 h-4"></i> Ajouter une tâche
            </button>
        </header>

        <div class="grid grid-cols-3 gap-6 mb-10">
            <div class="bg-[#123499]/5 border border-[#123499]/20 p-6 rounded-2xl">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-1">En attente</p>
                <p id="todoCount" class="text-2xl font-black">0</p>
            </div>
            <div class="bg-orange-500/5 border border-orange-500/20 p-6 rounded-2xl">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-1">En cours</p>
                <p id="doingCount" class="text-2xl font-black text-orange-500">0</p>
            </div>
            <div class="bg-green-500/5 border border-green-500/20 p-6 rounded-2xl">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-1">Terminées</p>
                <p id="doneCount" class="text-2xl font-black text-green-500">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div>
                <div class="flex items-center gap-2 mb-6 px-2">
                    <div class="status-dot bg-slate-500"></div>
                    <h2 class="font-black uppercase text-xs tracking-widest">À FAIRE</h2>
                </div>
                <div id="col-todo" class="space-y-4 min-h-[400px]"></div>
            </div>

            <div>
                <div class="flex items-center gap-2 mb-6 px-2">
                    <div class="status-dot bg-orange-500"></div>
                    <h2 class="font-black uppercase text-xs tracking-widest text-orange-500">EN COURS</h2>
                </div>
                <div id="col-doing" class="space-y-4 min-h-[400px]"></div>
            </div>

            <div>
                <div class="flex items-center gap-2 mb-6 px-2">
                    <div class="status-dot bg-green-500"></div>
                    <h2 class="font-black uppercase text-xs tracking-widest text-green-500">TERMINÉ</h2>
                </div>
                <div id="col-done" class="space-y-4 min-h-[400px]"></div>
            </div>
        </div>
    </main>

    <div id="taskModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-[#0a113a] border border-white/10 w-full max-w-md rounded-3xl p-8">
            <h2 class="text-2xl font-black uppercase mb-6">Nouvelle Tâche</h2>
            <div class="space-y-4">
                <input type="text" id="taskTitle" placeholder="Titre de la mission..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:border-[#123499] outline-none font-bold">
                <select id="taskPriority" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none font-bold">
                    <option value="Normal">Priorité Normale</option>
                    <option value="Haute">Priorité Haute 🔥</option>
                </select>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 p-4 rounded-xl font-black text-[10px] uppercase border border-white/10">Annuler</button>
                    <button onclick="saveTask()" class="flex-1 p-4 rounded-xl bg-[#123499] font-black text-[10px] uppercase">Lancer la tâche</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://lateattegnkqduqbpvta.supabase.co', 'sb_publishable_SspxOBPHM5ZIdRnX8W4V0A_ONolbILg', {
            auth: { persistSession: false }
        });

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('watchtower-theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
            lucide.createIcons();
        }
        if(localStorage.getItem('watchtower-theme') === 'light') document.body.classList.add('light-mode');

        // Modal Logic
        function openModal() { document.getElementById('taskModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('taskModal').classList.add('hidden'); }

        async function loadTasks() {
            const { data, error } = await _supabase.from('tasks').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);

            const cols = { todo: document.getElementById('col-todo'), doing: document.getElementById('col-doing'), done: document.getElementById('col-done') };
            Object.values(cols).forEach(c => c.innerHTML = ""); // Vider

            let counts = { todo: 0, doing: 0, done: 0 };

            data.forEach(t => {
                const statusKey = t.status.toLowerCase().replace(" ", "");
                counts[statusKey]++;
                
                const card = `
                    <div class="task-card p-5 group">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[9px] font-black px-2 py-1 rounded border border-white/10 uppercase ${t.priority === 'Haute' ? 'text-red-500 border-red-500/20' : 'text-slate-500'}">
                                ${t.priority}
                            </span>
                            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                ${t.status !== 'Done' ? `<button onclick="updateStatus('${t.id}', '${t.status}')" class="p-1 hover:text-green-500"><i data-lucide="arrow-right" class="w-3 h-3"></i></button>` : ''}
                                <button onclick="deleteTask('${t.id}')" class="p-1 hover:text-red-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                            </div>
                        </div>
                        <h3 class="font-bold text-sm uppercase leading-tight">${t.title}</h3>
                        <p class="text-[9px] text-slate-500 font-bold mt-3 uppercase tracking-tighter italic">Ajouté le ${new Date(t.created_at).toLocaleDateString()}</p>
                    </div>
                `;
                cols[statusKey].innerHTML += card;
            });

            document.getElementById('todoCount').innerText = counts.todo;
            document.getElementById('doingCount').innerText = counts.doing;
            document.getElementById('doneCount').innerText = counts.done;
            lucide.createIcons();
        }

        async function saveTask() {
            const title = document.getElementById('taskTitle').value;
            const priority = document.getElementById('taskPriority').value;
            if(!title) return;

            const { error } = await _supabase.from('tasks').insert([{ title, priority, status: 'Todo' }]);
            if(!error) { closeModal(); loadTasks(); document.getElementById('taskTitle').value = ""; }
        }

        async function updateStatus(id, current) {
            const next = current === 'Todo' ? 'Doing' : 'Done';
            await _supabase.from('tasks').update({ status: next }).eq('id', id);
            loadTasks();
        }

        async function deleteTask(id) {
            if(confirm("Supprimer cette tâche ?")) {
                await _supabase.from('tasks').delete().eq('id', id);
                loadTasks();
            }
        }

        async function logout() { await _supabase.auth.signOut(); window.location.href = 'login.html'; }

        loadTasks();
        lucide.createIcons();
    </script>
</body>
</html>
