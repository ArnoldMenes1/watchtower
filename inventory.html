<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchtower | Boutique Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --bg: #00072d; --text: #ffffff; --accent: #123499; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }
        body.light-mode { --bg: #f8fafc; --text: #0f172a; --card: #ffffff; --border: rgba(0,0,0,0.08); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; overflow-x: hidden; }
        
        .sidebar { background: rgba(0,0,0,0.2); backdrop-filter: blur(20px); border-right: 1px solid var(--border); }
        body.light-mode .sidebar { background: #ffffff; }
        .nav-link { transition: 0.3s; border-radius: 12px; color: #94a3b8; display: flex; align-items: center; gap: 12px; padding: 0.8rem 1rem; font-size: 0.875rem; font-weight: 700; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }
        
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; transition: 0.3s; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--accent); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar w-72 fixed h-full flex flex-col p-6 z-50">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="p-2 bg-[#123499] rounded-lg"><i data-lucide="shield" class="w-6 h-6 text-white"></i></div>
            <span class="font-extrabold tracking-tighter text-xl uppercase italic">The Watchtower</span>
        </div>

        <nav class="flex-grow space-y-1 overflow-y-auto pr-2">
            <a href="dashboard.html" class="nav-link"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</a>
            <a href="inventory.html" class="nav-link active"><i data-lucide="package" class="w-4 h-4"></i> Boutique</a>
            <a href="crm.html" class="nav-link"><i data-lucide="users" class="w-4 h-4"></i> CRM Contacts</a>
            <a href="mailer-hub.html" class="nav-link"><i data-lucide="mail" class="w-4 h-4"></i> Mailler Hub</a>
            <div class="pt-6 pb-2 px-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">Stratégie</div>
            <a href="goals.html" class="nav-link"><i data-lucide="target" class="w-4 h-4"></i> Objectifs</a>
            <a href="tasks.html" class="nav-link"><i data-lucide="check-square" class="w-4 h-4"></i> Tâches</a>
            <a href="social-manager.html" class="nav-link"><i data-lucide="share-2" class="w-4 h-4"></i> Social Manager</a>
            <div class="pt-6 pb-2 px-4 text-[10px] font-black text-blue-500 uppercase tracking-widest">Intelligence</div>
            <a href="ai-hub.html" class="nav-link border border-blue-500/20 bg-blue-500/5 text-blue-400"><i data-lucide="sparkles" class="w-4 h-4"></i> IA Hub</a>
        </nav>

        <div class="mt-auto pt-6 space-y-2 border-t border-white/5">
            <button onclick="toggleTheme()" class="w-full p-3 rounded-xl bg-[#123499]/10 text-[#123499] font-black text-[10px] uppercase flex items-center justify-center gap-2 border border-[#123499]/20 hover:bg-[#123499]/20 transition-all">
                <i data-lucide="sun" class="w-4 h-4"></i> SWITCH THÈME
            </button>
            <button onclick="logout()" class="nav-link text-red-500 w-full justify-center hover:bg-red-500/10">
                <i data-lucide="log-out" class="w-4 h-4"></i> Déconnexion
            </button>
        </div>
    </aside>

    <main class="flex-grow ml-72 p-10">
        <header class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-4xl font-black uppercase tracking-tight">Inventaire Boutique</h1>
                <p class="text-slate-500 text-sm font-bold mt-1 uppercase">Centralisation des produits FR & EN</p>
            </div>
            <button onclick="openModal()" class="bg-[#123499] text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-blue-900/40 flex items-center gap-2 hover:scale-105 transition-all">
                <i data-lucide="plus" class="w-4 h-4"></i> Ajouter un Produit
            </button>
        </header>

        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="productModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-slate-900 border border-white/10 w-full max-w-2xl rounded-3xl p-8 overflow-y-auto max-h-[90vh] shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-black uppercase mb-6 flex items-center gap-3">
                <i data-lucide="package" class="text-[#123499]"></i> Nouveau Produit
            </h2>
            <input type="hidden" id="editId">
            <input type="hidden" id="pImgUrl"> <div class="grid grid-cols-2 gap-4">
                <input type="text" id="pName" placeholder="Nom du produit" class="col-span-2 bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none font-bold focus:border-[#123499]">
                <textarea id="pDesc" placeholder="Description du produit..." class="col-span-2 bg-white/5 border border-white/10 rounded-xl p-4 text-white h-24 outline-none font-bold focus:border-[#123499]"></textarea>
                
                <input type="number" id="pPrice" placeholder="Prix" class="bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none font-bold focus:border-[#123499]">
                <select id="pCurr" class="bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none font-bold">
                    <option value="$">Dollars ($)</option>
                    <option value="FC">Francs Congolais (FC)</option>
                </select>

                <select id="pCat" class="bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none font-bold">
                    <option value="Notion Template">Notion Template</option>
                    <option value="Software">Software</option>
                    <option value="Service Dev">Service Dev</option>
                </select>
                <select id="pLang" class="bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none font-bold border-blue-500/30">
                    <option value="FR">Français (FR)</option>
                    <option value="EN">Anglais (EN)</option>
                    <option value="BILINGUAL">Bilingue</option>
                </select>
                
                <div class="col-span-2 border-2 border-dashed border-white/10 rounded-xl p-6 text-center hover:border-[#123499] transition-all">
                    <input type="file" id="pImageFile" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                    <label for="pImageFile" class="cursor-pointer flex flex-col items-center gap-2">
                        <i data-lucide="image-plus" class="w-8 h-8 text-blue-400"></i>
                        <span class="text-[10px] font-black uppercase text-slate-400">Importer l'image (PNG, JPG, WEBP)</span>
                    </label>
                    <div id="uploadStatus" class="mt-3 text-[10px] font-black uppercase tracking-widest"></div>
                </div>

                <input type="text" id="pChariow" placeholder="Lien Boutique / Checkout" class="col-span-2 bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none font-bold focus:border-[#123499]">
                
                <div class="col-span-2 flex gap-3 pt-6">
                    <button onclick="closeModal()" class="flex-1 p-4 rounded-xl font-black text-[10px] uppercase border border-white/10 text-white">Annuler</button>
                    <button id="saveBtn" onclick="saveProduct()" class="flex-1 p-4 rounded-xl bg-[#123499] text-white font-black text-[10px] uppercase hover:bg-blue-600 shadow-lg shadow-blue-900/30">Enregistrer le produit</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://lateattegnkqduqbpvta.supabase.co', 'sb_publishable_SspxOBPHM5ZIdRnX8W4V0A_ONolbILg', { auth: { persistSession: false } });

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('watchtower-theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
            lucide.createIcons();
        }
        if(localStorage.getItem('watchtower-theme') === 'light') document.body.classList.add('light-mode');

        function openModal() { 
            document.getElementById('editId').value = "";
            document.getElementById('pImgUrl').value = "";
            document.getElementById('uploadStatus').innerText = "";
            document.getElementById('pName').value = "";
            document.getElementById('pDesc').value = "";
            document.getElementById('modalTitle').innerText = "Nouveau Produit";
            document.getElementById('productModal').classList.remove('hidden'); 
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('productModal').classList.add('hidden'); }

        // GESTION UPLOAD IMAGE
        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const status = document.getElementById('uploadStatus');
            status.innerHTML = '<span class="text-blue-500 animate-pulse">Synchronisation avec Supabase...</span>';

            const fileName = `${Date.now()}-${file.name.replace(/\s/g, '_')}`;
            const filePath = `product-images/${fileName}`;

            const { data: uploadData, error: uploadError } = await _supabase.storage
                .from('products')
                .upload(filePath, file);

            if (uploadError) {
                status.innerHTML = '<span class="text-red-500">Erreur lors de l\'upload</span>';
                console.error(uploadError);
            } else {
                const { data } = _supabase.storage.from('products').getPublicUrl(filePath);
                document.getElementById('pImgUrl').value = data.publicUrl;
                status.innerHTML = '<span class="text-green-500">Image prête pour la boutique !</span>';
            }
        }

        async function loadProducts() {
            const { data, error } = await _supabase.from('products').select('*').order('created_at', { ascending: false });
            if (error) return;

            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";

            data.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card p-6 flex flex-col">
                        <img src="${p.image_url || 'https://via.placeholder.com/400x250'}" class="w-full h-48 object-cover rounded-2xl mb-5 bg-black/20">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] font-black px-2 py-1 rounded bg-[#123499]/10 text-[#123499] border border-[#123499]/20 uppercase">${p.language}</span>
                            <p class="text-2xl font-black text-[#123499]">${p.price} ${p.currency}</p>
                        </div>
                        <h3 class="font-black text-xl uppercase tracking-tighter mb-2 leading-tight">${p.name}</h3>
                        <p class="text-slate-500 text-xs font-bold line-clamp-2 mb-6 uppercase tracking-wide">${p.category}</p>
                        <div class="mt-auto flex gap-3 pt-4 border-t border-white/5">
                            <button onclick="editProduct('${p.id}')" class="flex-1 p-3 rounded-xl bg-white/5 text-[10px] font-black uppercase hover:bg-white/10 transition-all">Modifier</button>
                            <button onclick="deleteProduct('${p.id}')" class="p-3 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        async function saveProduct() {
            const editId = document.getElementById('editId').value;
            const imageUrl = document.getElementById('pImgUrl').value;

            const payload = {
                name: document.getElementById('pName').value,
                description: document.getElementById('pDesc').value,
                price: parseFloat(document.getElementById('pPrice').value) || 0,
                currency: document.getElementById('pCurr').value,
                category: document.getElementById('pCat').value,
                language: document.getElementById('pLang').value,
                image_url: imageUrl,
                chariow_link: document.getElementById('pChariow').value,
                is_active: true
            };

            const action = editId ? _supabase.from('products').update(payload).eq('id', editId) : _supabase.from('products').insert([payload]);
            const { error } = await action;

            if (error) alert(error.message);
            else { closeModal(); loadProducts(); }
        }

        async function editProduct(id) {
            const { data } = await _supabase.from('products').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('editId').value = data.id;
                document.getElementById('pName').value = data.name;
                document.getElementById('pDesc').value = data.description;
                document.getElementById('pPrice').value = data.price;
                document.getElementById('pImgUrl').value = data.image_url;
                document.getElementById('pLang').value = data.language;
                document.getElementById('modalTitle').innerText = "Modifier Produit";
                document.getElementById('productModal').classList.remove('hidden');
            }
        }

        async function deleteProduct(id) {
            if (confirm("Supprimer ce produit définitivement ?")) {
                await _supabase.from('products').delete().eq('id', id);
                loadProducts();
            }
        }

        function logout() { window.location.href = 'login.html'; }

        loadProducts();
        lucide.createIcons();
    </script>
</body>
</html>
